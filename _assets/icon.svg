<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- < 符号 -->
  <polyline points="10,12 6.5,16 10,20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- > 符号 -->
  <polyline points="16,12 19.5,16 16,20" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- / 符号 -->
  <line x1="13.5" y1="11" x2="12" y2="21" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>

  <!-- 底部元数据横线 -->
  <line x1="6" y1="24.5" x2="16" y2="24.5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="6" y1="27.5" x2="12" y2="27.5" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.4"/>
</svg>
